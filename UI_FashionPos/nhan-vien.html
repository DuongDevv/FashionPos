<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Nhân Viên - Fashion Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal-active { overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 text-white flex-shrink-0 hidden md:flex flex-col">
            <div class="p-6 text-2xl font-bold text-center border-b border-slate-700 uppercase tracking-widest">
                FASHION <span class="text-blue-400">POS</span>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="index.html" class="flex items-center p-3 hover:bg-slate-800 rounded-lg transition"><i class="fa-solid fa-chart-line w-6"></i> Tổng quan</a>
                <a href="quan-ly-kho.html" class="flex items-center p-3 hover:bg-slate-800 rounded-lg transition"><i class="fa-solid fa-boxes-stacked w-6"></i> Quản lý kho</a>
                <a href="nhan-vien.html" class="flex items-center p-3 bg-blue-600 rounded-lg transition"><i class="fa-solid fa-user-tie w-6"></i> Nhân viên</a>
                <a href="ban-hang.html" class="flex items-center p-3 hover:bg-slate-800 rounded-lg transition"><i class="fa-solid fa-cash-register w-6"></i> Bán hàng</a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-10">
                <h2 class="text-xl font-semibold text-gray-800">Đội Ngũ Nhân Viên</h2>
                <button onclick="toggleModal(true)" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl hover:bg-blue-700 transition flex items-center shadow-lg shadow-blue-200 font-bold text-sm">
                    <i class="fa-solid fa-plus mr-2"></i> THÊM NHÂN VIÊN
                </button>
            </header>

            <div class="p-6">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-400 text-[10px] uppercase font-bold border-b">
                            <tr>
                                <th class="px-6 py-4">Nhân viên</th>
                                <th class="px-6 py-4">Vai trò</th>
                                <th class="px-6 py-4 text-center">Trạng thái</th>
                                <th class="px-6 py-4 text-right">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-50">
                            <tr class="hover:bg-gray-50/50 transition">
                                <td class="px-6 py-4">
                                    <div class="flex items-center space-x-3">
                                        <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold">QT</div>
                                        <div>
                                            <p class="font-bold text-gray-800">Lê Quốc Tuấn</p>
                                            <p class="text-xs text-gray-400">tuan.le@fashion.com</p>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-sm font-medium text-gray-600">Quản lý</td>
                                <td class="px-6 py-4 text-center">
                                    <span class="px-2.5 py-1 bg-green-100 text-green-700 rounded-lg text-[10px] font-black uppercase">Đang làm</span>
                                </td>
                                <td class="px-6 py-4 text-right">
                                    <button class="text-gray-400 hover:text-blue-600 p-2"><i class="fa-solid fa-pen-to-square"></i></button>
                                    <button class="text-gray-400 hover:text-red-500 p-2"><i class="fa-solid fa-trash"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="employeeModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="px-8 py-6 border-b flex justify-between items-center bg-gray-50/50">
                <div>
                    <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">Thêm nhân sự mới</h3>
                    <p class="text-xs text-gray-400 mt-1">Vui lòng điền đầy đủ thông tin bên dưới</p>
                </div>
                <button onclick="toggleModal(false)" class="text-gray-400 hover:text-slate-800 transition text-3xl">&times;</button>
            </div>

            <form class="p-8 space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Họ và tên *</label>
                        <input type="text" placeholder="Nguyễn Văn A" class="w-full border-2 border-gray-100 rounded-xl px-4 py-2.5 focus:border-blue-500 focus:ring-0 outline-none transition font-medium text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Số điện thoại *</label>
                        <input type="text" placeholder="09xx xxx xxx" class="w-full border-2 border-gray-100 rounded-xl px-4 py-2.5 focus:border-blue-500 focus:ring-0 outline-none transition font-medium text-sm">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Email liên hệ</label>
                    <input type="email" placeholder="example@gmail.com" class="w-full border-2 border-gray-100 rounded-xl px-4 py-2.5 focus:border-blue-500 focus:ring-0 outline-none transition font-medium text-sm">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Vai trò / Chức vụ</label>
                        <select class="w-full border-2 border-gray-100 rounded-xl px-4 py-2.5 focus:border-blue-500 outline-none transition font-medium text-sm bg-white">
                            <option>Nhân viên bán hàng</option>
                            <option>Quản lý cửa hàng</option>
                            <option>Nhân viên kho</option>
                            <option>Bảo vệ / Tạp vụ</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Ca làm việc</label>
                        <select class="w-full border-2 border-gray-100 rounded-xl px-4 py-2.5 focus:border-blue-500 outline-none transition font-medium text-sm bg-white">
                            <option>Ca sáng (8:00 - 14:00)</option>
                            <option>Ca chiều (14:00 - 22:00)</option>
                            <option>Cả ngày (Full-time)</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-2 pt-2">
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="checkbox" checked class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                        <span class="text-sm text-gray-600 font-medium">Kích hoạt tài khoản truy cập hệ thống</span>
                    </label>
                </div>

                <div class="flex items-center justify-end space-x-4 pt-6 border-t mt-4">
                    <button type="button" onclick="toggleModal(false)" class="text-sm font-bold text-gray-400 hover:text-slate-600 transition uppercase">Hủy bỏ</button>
                    <button type="submit" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-600 transition shadow-xl shadow-slate-200">
                        Lưu nhân sự
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleModal(show) {
            const modal = document.getElementById('employeeModal');
            if (show) {
                modal.classList.remove('hidden');
                document.body.classList.add('modal-active');
            } else {
                modal.classList.add('hidden');
                document.body.classList.remove('modal-active');
            }
        }

        // Đóng modal khi click ra ngoài vùng trắng
        window.onclick = function(event) {
            const modal = document.getElementById('employeeModal');
            if (event.target == modal) {
                toggleModal(false);
            }
        }
    </script>

</body>
</html>
