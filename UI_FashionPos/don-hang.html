<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn Hàng - Fashion Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 text-white flex-shrink-0 hidden md:flex flex-col">
            <div class="p-6 text-2xl font-bold text-center border-b border-slate-700 italic">FASHION POS</div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="index.html" class="flex items-center p-3 hover:bg-slate-800 rounded-lg transition"><i class="fa-solid fa-chart-line w-6"></i> Tổng quan</a>
                <a href="san-pham.html" class="flex items-center p-3 hover:bg-slate-800 rounded-lg transition"><i class="fa-solid fa-shirt w-6"></i> Sản phẩm</a>
                <a href="nhap-hang.html" class="flex items-center p-3 hover:bg-slate-800 rounded-lg transition text-sm"><i class="fa-solid fa-truck-ramp-box w-6"></i> Nhập hàng</a>
                <a href="nha-cung-cap.html" class="flex items-center p-3 hover:bg-slate-800 rounded-lg transition text-sm"><i class="fa-solid fa-boxes-packing w-6"></i> Nhà cung cấp</a>
                <a href="don-hang.html" class="nav-item flex items-center p-3 hover:bg-slate-800 rounded-lg transition"><i class="fa-solid fa-cart-shopping w-6"></i> Đơn hàng</a>
                <a href="khach-hang.html" class="flex items-center p-3 hover:bg-slate-800 rounded-lg transition"><i class="fa-solid fa-users w-6"></i> Khách hàng</a>
                <a href="nhan-vien.html" class="flex items-center p-3 hover:bg-slate-800 rounded-lg transition"><i class="fa-solid fa-user-tie w-6"></i> Nhân viên</a>
                <a href="bao-cao.html" class="flex items-center p-3 hover:bg-slate-800 rounded-lg transition"><i class="fa-solid fa-file-invoice-dollar w-6"></i> Báo cáo</a>
                <a href="cai-dat.html" class="flex items-center p-3 hover:bg-slate-800 rounded-lg transition"><i class="fa-solid fa-gear w-6"></i> Cài đặt</a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="bg-white shadow-sm p-4 sticky top-0 z-10">
                <h2 class="text-xl font-semibold text-gray-800">Quản Lý Đơn Hàng</h2>
            </header>

            <div class="p-6">
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <div class="flex space-x-4 border-b mb-6 text-sm font-medium">
                        <button class="pb-4 border-b-2 border-blue-600 text-blue-600">Đang xử lý (12)</button>
                        <button class="pb-4 text-gray-400">Hoàn thành (1.200)</button>
                        <button class="pb-4 text-gray-400">Đã hủy (5)</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="text-gray-400 font-normal border-b">
                                <tr>
                                    <th class="py-3">Mã đơn</th>
                                    <th class="py-3">Khách hàng</th>
                                    <th class="py-3">Ngày đặt</th>
                                    <th class="py-3">Tổng cộng</th>
                                    <th class="py-3">Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y">
                                <tr class="hover:bg-blue-50/50">
                                    <td class="py-4 font-bold text-blue-600">#DH008</td>
                                    <td class="py-4">Nguyễn Thị C</td>
                                    <td class="py-4 text-gray-500">14/04/2026</td>
                                    <td class="py-4 font-bold">1.250.000đ</td>
                                    <td class="py-4"><span class="bg-orange-100 text-orange-600 px-3 py-1 rounded text-xs">Chờ lấy hàng</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
